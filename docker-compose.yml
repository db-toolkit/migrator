services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: migrator_test
      MYSQL_USER: migrator
      MYSQL_PASSWORD: migrator
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: migrator
      POSTGRES_PASSWORD: migrator
      POSTGRES_DB: migrator_test
    ports:
      - "5433:5432"
